# ╔══════════════════════════════════════════════════════════════╗
# ║  Matrix Server Configuration                                ║
# ║  Edit these values before running the playbook.             ║
# ║  Secrets live in vault.yml (ansible-vault edit vault.yml).  ║
# ╚══════════════════════════════════════════════════════════════╝

# ── Identity ──
# server_name: Permanent homeserver identity. User IDs = @user:this-value.
# YOU CANNOT CHANGE THIS LATER.
matrix_server_name: "nasa.matrix.cobular.com"

# hostname: FQDN where Caddy serves the client/federation API.
# Needs DNS A record → VM IP.
matrix_hostname: "nasa.matrix.cobular.com"

# element_hostname: separate origin for Element Web (XSS containment —
# never serve the client from the homeserver's domain).
# Needs its own DNS A record → same VM IP.
element_hostname: "element.cobular.com"

# ── Credentials ──
# Actual values are vaulted; these mappings keep templates readable.
postgres_superuser_password: "{{ vault_postgres_superuser_password }}"
postgres_synapse_password: "{{ vault_postgres_synapse_password }}"
postgres_bridge_password: "{{ vault_postgres_bridge_password }}"
registration_shared_secret: "{{ vault_registration_shared_secret }}"
macaroon_secret_key: "{{ vault_macaroon_secret_key }}"
form_secret: "{{ vault_form_secret }}"

# ── System ──
admin_user: "cobular"
matrix_base_dir: "/home/{{ admin_user }}/matrix"

# Tailscale IP of the VM. The admin panel (caddy-admin) publishes its port bound
# to THIS address only, so it is reachable over the tailnet but never on the
# public IP. If the node's Tailscale IP ever changes, update this and inventory.
tailscale_ip: "100.97.163.84"

# ── Container images ──
# Pinned so every upgrade is a reviewable line in git. Renovate (renovate.json
# at the repo root) proposes bumps via PR. Postgres/Caddy minor+patch auto-merge;
# Synapse and the bridge are assigned to you and never auto-merge, because they
# run DB-schema / config migrations on startup — read the release notes and take
# a backup before merging. Values below are what was live on 2026-07-11; keep
# them at-or-ahead of the running server (a pin BEHIND live downgrades Synapse
# onto a newer schema on the next configure → crash). The `# renovate:` comment
# on each line is load-bearing (Renovate's custom manager reads it) — keep it.
# renovate: datasource=docker depName=postgres
postgres_image: "postgres:16.14-alpine"
# renovate: datasource=docker depName=caddy
caddy_image: "caddy:2.11.4-alpine"
# renovate: datasource=docker depName=matrixdotorg/synapse
synapse_image: "matrixdotorg/synapse:v1.156.0"
# On a normal release tag (not the rolling :latest dev build) — Renovate tracks
# it by semver like Synapse. Ping tier: bridge upgrades can carry DB/config
# migrations, so read notes + back up before merging a bump.
# renovate: datasource=docker depName=dock.mau.dev/mautrix/discord
discord_image: "dock.mau.dev/mautrix/discord:v0.7.6"
# Ketesa ships a rolling :latest, so Renovate pins and bumps its digest rather
# than relying on a mutable tag. It is the successor to synapse-admin.
# renovate: datasource=docker depName=ghcr.io/etkecc/ketesa
synapse_admin_image: "ghcr.io/etkecc/ketesa:latest@sha256:a2f40f95950c16b782ef183f8af64aaf9445ec718b8edfdd6d07b12ba3a9a193"

# ── Synapse ──
max_upload_size: "100M"
encryption_default: "all"
federation_enabled: true

# ── Backfill Mode ──
# true  → size Postgres/Synapse for the up-specced backfill VM (16 GiB):
#         2GB shared_buffers, synchronous_commit=off, large Synapse cache.
# false → steady-state sizing for the B2s (4 GiB).
# Flip together with the VM resize, then re-run ./deploy.sh configure.
# Full procedure: RUNBOOK.md.
backfill_mode: true

# ── Discord Bridge Backfill ──
# MUST be set before first bridge login.
# initial (portal creation): unlimited (-1) is NOT supported by the bridge —
#   use a high finite limit. The bridge fetches the whole set from Discord
#   BEFORE bridging anything, so expect a long quiet fetch phase per channel.
# missed (bridge startup): -1 = everything since the last bridged message.
backfill_initial_dm: 1000000
backfill_initial_channel: 1000000
backfill_initial_thread: 100000
backfill_missed_dm: -1
backfill_missed_channel: -1
backfill_missed_thread: -1
backfill_max_guild_members: -1

# ── Backups ──
# Dumps are age-encrypted locally, then shipped to Azure Blob via the VM's
# managed identity. Blob retention (30 days) is a lifecycle policy in the
# ARM template; local retention is below.
backup_dir: "/home/{{ admin_user }}/backups"
backup_retention_days: 7
backup_storage_account: "cobularmatrixbackups"   # must match arm/matrix-infra.parameters.json
backup_blob_container: "backups"
# Public half of the backup encryption key. Private half:
# vault_age_backup_private_key in vault.yml — needed to restore, guard it.
backup_age_public_key: "age12p8qu7kgqfrz9pc5xw3j8c7ulgg0wkznjry3q7zjj8t6fxt6fegsuqm7hc"
