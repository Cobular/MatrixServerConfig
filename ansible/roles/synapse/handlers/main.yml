# roles/synapse/handlers/main.yml

- name: restart synapse
  command: docker compose restart synapse
  args:
    chdir: "{{ matrix_base_dir }}"
  become_user: "{{ admin_user }}"

- name: restart all services
  command: docker compose up -d
  args:
    chdir: "{{ matrix_base_dir }}"
  become_user: "{{ admin_user }}"
